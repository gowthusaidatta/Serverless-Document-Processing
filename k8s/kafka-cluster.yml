apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: claims-kafka
  namespace: default
spec:
  kafka:
    version: 3.6.0
    replicas: 1
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1024Mi"
        cpu: "500m"
    storage:
      type: ephemeral
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: nodeport
        port: 9093
        type: nodeport
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.retention.hours: 168
  zookeeper:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "125m"
      limits:
        memory: "512Mi"
        cpu: "250m"
    storage:
      type: ephemeral
  entityOperator:
    topicOperator: {}
    userOperator: {}
